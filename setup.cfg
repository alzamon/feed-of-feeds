[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[flake8]
max-line-length = 79
exclude = 
    .git,
    __pycache__,
    .venv*,
    venv*,
    env*,
    build,
    dist,
    *.egg-info,
    .pytest_cache,
    .tox
ignore = W503